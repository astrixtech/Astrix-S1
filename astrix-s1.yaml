    name: "Fan Level"
    id: sf_fan_level_text
    icon: mdi:fan-speed-1
    update_interval: never
    lambda: |-
      if (id(sf_fan_level) < 0) {
        return {};
      }
      return to_string(id(sf_fan_level));

  - platform: template
    name: "Light Level"
    id: sf_light_level_text
    icon: mdi:brightness-percent
    update_interval: never
    lambda: |-
      if (id(sf_light_level) < 0) {
        return {};
      }
      return to_string(id(sf_light_level)) + "%";

  - platform: template
    name: "Light 2 Level"
    id: sf_light2_level_text
    icon: mdi:brightness-percent
    update_interval: never
    lambda: |-
      if (id(sf_light2_level) < 0) {
        return {};
      }
      return to_string(id(sf_light2_level)) + "%";

  - platform: template
    name: "Blower Level"
    id: sf_blower_level_text
    icon: mdi:fan-chevron-up
    update_interval: never
    lambda: |-
      if (id(sf_blower_level) < 0) {
        return {};
      }
      return to_string(id(sf_blower_level)) + "%";

  - platform: template
    name: "Humidifier Level"
    id: sf_humidifier_level_text
    icon: mdi:water-percent
    update_interval: never
    lambda: |-
      if (id(sf_humidifier_level) < 0) {
        return {};
      }
      return to_string(id(sf_humidifier_level));

switch:
  # Turn OFF to release GGS BLE for PC capture (tools/ggs_ble.py). Turn ON to resume monitoring.
  - platform: ble_client
    ble_client_id: ggs_client
    id: ggs_connect_switch
    name: "GGS Connect"
    icon: mdi:bluetooth-connect
    restore_mode: ALWAYS_ON
  - platform: restart
    name: "Reboot"

